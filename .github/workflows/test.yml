name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23", "1.24"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Test core library
        run: go test ./... -race -count=1 -cover

      - name: Test pkg/html
        working-directory: pkg/html
        run: go test ./... -race -count=1

      - name: Test pkg/markup_to_gomb
        working-directory: pkg/markup_to_gomb
        run: go test ./... -race -count=1

      - name: Build and run gomblint
        working-directory: cmd/gomblint
        run: go build -o gomblint . && ./gomblint ../../...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m

  examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - alpinejs
          - caching
          - components
          - htmx
          - layout
          - test1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build ${{ matrix.example }}
        working-directory: examples/${{ matrix.example }}
        run: go build ./...
